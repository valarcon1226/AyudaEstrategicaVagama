<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso al Panel | Ayuda Estratégica</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          "primary": "#000613", "primary-container": "#001f3f",
          "secondary": "#115cb9", "tertiary-fixed-dim": "#00daf3",
          "surface": "#f7fafc", "surface-container-low": "#f1f4f6",
          "on-surface": "#181c1e", "on-surface-variant": "#43474e",
          "error": "#ba1a1a",
        },
        fontFamily: { sans: ["Inter", "sans-serif"] }
      }}
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align:middle; }
  </style>
</head>

<body class="bg-[#000613] min-h-screen flex items-center justify-center p-6 font-sans antialiased">

  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-[#001f3f] rounded-2xl mb-4 border border-white/10">
        <span class="material-symbols-outlined text-[#00daf3] text-3xl">shield_person</span>
      </div>
      <h1 class="text-2xl font-black text-white tracking-tight">Panel Estratégico</h1>
      <p class="text-white/40 text-sm mt-1">Ayuda Estratégica — Acceso Interno</p>
    </div>

    <!-- Card de Login -->
    <div class="bg-[#001f3f]/60 backdrop-blur-md border border-white/10 rounded-2xl p-8">

      <!-- Error de login -->
      <div id="login-error"
           class="hidden mb-5 p-3 bg-red-900/30 border border-red-500/30 rounded-lg text-red-300 text-sm text-center">
      </div>

      <form id="login-form" class="space-y-5">
        <!-- Email -->
        <div>
          <label class="block text-xs font-bold text-white/50 uppercase tracking-wider mb-1.5" for="login-email">
            Correo Electrónico
          </label>
          <input id="login-email" type="email" autocomplete="email" required
                 placeholder="recruiter@ayudaestrategica.com"
                 class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm
                        placeholder:text-white/20 focus:outline-none focus:ring-2 focus:ring-[#00daf3]
                        transition-all" />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-bold text-white/50 uppercase tracking-wider mb-1.5" for="login-password">
            Contraseña
          </label>
          <div class="relative">
            <input id="login-password" type="password" autocomplete="current-password" required
                   placeholder="••••••••"
                   class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm
                          placeholder:text-white/20 focus:outline-none focus:ring-2 focus:ring-[#00daf3]
                          transition-all pr-12" />
            <button type="button" id="toggle-pwd"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/70 transition-colors">
              <span class="material-symbols-outlined text-base">visibility</span>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" id="login-btn"
                class="w-full bg-[#115cb9] hover:bg-[#0d4a9a] text-white font-black py-3.5 rounded-xl
                       transition-all hover:-translate-y-0.5 active:scale-95 flex items-center justify-center gap-2 mt-2">
          Ingresar al Panel
          <span class="material-symbols-outlined text-base">login</span>
        </button>
      </form>

      <p class="text-center text-white/25 text-xs mt-6">
        ¿Olvidaste tu contraseña? Contacta al administrador.
      </p>
    </div>

    <!-- Volver al sitio -->
    <div class="text-center mt-6">
      <a href="../index.html" class="text-white/30 text-xs hover:text-white/60 transition-colors inline-flex items-center gap-1">
        <span class="material-symbols-outlined text-sm">arrow_back</span> Volver al sitio público
      </a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script>
    // Si ya hay sesión, redirigir al dashboard
    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    })();

    // Toggle password visibility
    document.getElementById('toggle-pwd')?.addEventListener('click', function() {
      const input = document.getElementById('login-password');
      const icon  = this.querySelector('.material-symbols-outlined');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility';
      }
    });

    // Login form
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn   = document.getElementById('login-btn');
      const error = document.getElementById('login-error');
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="animation:spin 1s linear infinite">progress_activity</span> Verificando...';
      error.classList.add('hidden');

      const { data, error: authError } = await db.auth.signInWithPassword({ email, password: pass });

      if (authError) {
        error.textContent = 'Credenciales incorrectas. Verifica tu correo y contraseña.';
        error.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = 'Ingresar al Panel <span class="material-symbols-outlined text-base">login</span>';
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
